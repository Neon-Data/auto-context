name: "Auto-Context: PR Update"

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: auto-context-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-context:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - uses: Neon-Data/auto-context@main
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          debug: true             # show full Claude output in action logs
          pr-mode: auto-commit    # commits directly to the PR branch
          # pr-mode: comment        # default — posts a comment with a link to create a PR
          # pr-mode: auto-pr        # creates a PR targeting the current PR branch
